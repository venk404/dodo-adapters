# ============================================================
# SonarQube Configuration for dodo-adapters
# https://docs.sonarsource.com/sonarqube-server/latest/analyzing-source-code/analysis-scope/
# ============================================================

# Project key (must match project created in SonarQube server)
sonar.projectKey=dodo-adapters

# Display name in SonarQube UI
sonar.projectName=dodo-adapters

# Directories to scan (monorepo: packages + examples)
sonar.sources=packages,examples

# Files/folders to exclude from analysis:
# - node_modules: third-party dependencies
# - dist: build output
# - *.spec.ts, *.test.ts: test files (not counted as code)
# - coverage: test coverage reports
# - .next: Next.js build output
# - *.d.ts: TypeScript type definitions
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.spec.ts,**/*.test.ts,**/coverage/**,**/.next/**,**/*.d.ts

# Test directories (for coverage calculation)
sonar.tests=packages

# Test file patterns to include in coverage analysis
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts

# Path to JavaScript coverage report (lcov format)
# Uses wildcard to find coverage in each package: packages/*/coverage/lcov.info
sonar.javascript.lcov.reportPaths=packages/core/coverage/lcov.info

# Source file encoding (UTF-8 is standard)
sonar.sourceEncoding=UTF-8

# Use Git for SCM blame data (enables new code detection on PRs)
sonar.scm.provider=git